server:
  host: 127.0.0.1
  port: 33300

upstream:
  base_url: https://token-plan-cn.xiaomimimo.com/v1
  # Prefer overriding this with MIMO_API_KEY / XIAOMIMIMO_API_KEY.
  api_key: NO-KEY
  # Provider default model. Unknown Codex pseudo-models can fall back to this.
  model: mimo-v2.5
  # Provider-supported models exposed by /v1/models.
  models:
    - mimo-v2.5
    - mimo-v2.5-pro
  # Client-facing aliases. Useful when Codex sends internal model names such as
  # codex-auto-review that the Xiaomi provider does not recognize.
  aliases:
    codex-auto-review: mimo-v2.5
  fallback_unknown_model_to_default: true
  thinking:
    # Set true to send {"thinking":{"type":"enabled"}} to Xiaomi MiMo.
    # When true, the shim stores and replays assistant.reasoning_content.
    # When false, the shim does not persist or send reasoning_content.
    enabled: false

generation:
# These defaults are used only when Codex does not send the field.
# default_temperature: 0.85
# default_top_p: 0.95
# default_max_output_tokens: 131072

http:
  request_timeout_secs: 300
  http2_prior_knowledge: false

behavior:
  access_log: true
  response_store_max: 1000
  forward_parallel_tool_calls: true

log:
  level: codex_mimo_shim=info,tower_http=warn
