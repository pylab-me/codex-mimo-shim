name: Release-CI

concurrency:
  group: release-ci
  cancel-in-progress: true

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, e.g. v0.1.6"
        required: true
        type: string
      private_ref:
        description: "Private repo ref, tag, branch, or commit"
        required: false
        default: "main"
        type: string
      binary_name:
        description: "Release binary name without .exe"
        required: true
        default: "codex-mimo-shim"
        type: string
      rust_toolchain:
        description: "Rust toolchain"
        required: true
        default: "stable"
        type: string

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  release:
    name: Build and package ${{ matrix.platform.label }}
    runs-on: ${{ matrix.platform.runner }}
    environment: release

    strategy:
      fail-fast: false
      matrix:
        platform:
          - label: Windows x86_64
            runner: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: windows-x86_64
            archive_name: windows-x86_64.zip
            binary_suffix: .exe
          - label: Linux x86_64
            runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: linux-x86_64
            archive_name: linux-x86_64.tar.gz
            binary_suffix: ""
          - label: macOS arm64
            runner: macos-14
            target: aarch64-apple-darwin
            artifact_name: macos-arm64
            archive_name: macos-arm64.tar.gz
            binary_suffix: ""

    permissions:
      contents: write

    env:
      CODEX_MIMO_SHIM_PRIVATE_REPO_SLUG: ${{ secrets.CODEX_MIMO_SHIM_PRIVATE_REPO_SLUG }}
      CODEX_MIMO_SHIM_PRIVATE_REPO_REF: ${{ secrets.CODEX_MIMO_SHIM_PRIVATE_REPO_REF }}

    steps:
      - name: Checkout public distribution repo
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Checkout private source
        uses: actions/checkout@v6
        with:
          repository: ${{ env.CODEX_MIMO_SHIM_PRIVATE_REPO_SLUG }}
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          ref: ${{ inputs.private_ref || env.CODEX_MIMO_SHIM_PRIVATE_REPO_REF || 'main' }}
          path: private-src
          persist-credentials: false

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ inputs.rust_toolchain }}
          targets: ${{ matrix.platform.target }}
          components: rustfmt

      - name: Cache Cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Inject public build.rs
        run: |
          set -euo pipefail
          cp ./build.rs ./private-src/build.rs

      - name: Calculate release fingerprints
        run: |
          set -euo pipefail

          sha256_file() {
            if command -v sha256sum >/dev/null 2>&1; then
              sha256sum "$1" | awk '{print tolower($1)}'
            elif command -v shasum >/dev/null 2>&1; then
              shasum -a 256 "$1" | awk '{print tolower($1)}'
            elif command -v certutil >/dev/null 2>&1; then
              certutil -hashfile "$1" SHA256 | awk 'NF == 1 && $1 ~ /^[0-9A-Fa-f]{64}$/ {print tolower($1); exit}'
            else
              echo "No SHA256 tool found" >&2
              exit 1
            fi
          }

          find_python() {
            if command -v python3 >/dev/null 2>&1; then
              echo "python3"
            elif command -v python >/dev/null 2>&1; then
              echo "python"
            else
              echo "No Python executable found" >&2
              exit 1
            fi
          }

          lock_hash="$(sha256_file ./Cargo.lock)"
          workflow_hash="$(sha256_file ./.github/workflows/release.yml)"
          build_rs_hash="$(sha256_file ./build.rs)"
          python_cmd="$(find_python)"

          {
            echo "BUILD_CARGO_LOCK_SHA256=$lock_hash"
            echo "BUILD_CI_WORKFLOW_SHA256=$workflow_hash"
            echo "BUILD_PUBLIC_BUILD_RS_SHA256=$build_rs_hash"
            echo "BUILD_SOURCE_REF=${{ inputs.private_ref || env.CODEX_MIMO_SHIM_PRIVATE_REPO_REF || 'main' }}"
            echo "BUILD_SOURCE_REPOSITORY=${{ env.CODEX_MIMO_SHIM_PRIVATE_REPO_SLUG }}"
            echo "BUILD_RELEASE_VERSION=${{ inputs.version }}"
            echo "BUILD_RELEASE_TARGET=${{ matrix.platform.target }}"
          } >> "$GITHUB_ENV"

          cp -f ./Cargo.lock ./private-src/Cargo.lock
          printf '%s\n' "$lock_hash" > ./Cargo.lock.sha256
          printf '%s\n' "$workflow_hash" > ./release.yml.sha256
          printf '%s\n' "$build_rs_hash" > ./build.rs.sha256

          BUILD_METADATA_NAME="${{ inputs.binary_name }}" \
          BUILD_METADATA_VERSION="${{ inputs.version }}" \
          BUILD_METADATA_PRIVATE_REPOSITORY="${{ env.CODEX_MIMO_SHIM_PRIVATE_REPO_SLUG }}" \
          BUILD_METADATA_PRIVATE_REF="${{ inputs.private_ref || env.CODEX_MIMO_SHIM_PRIVATE_REPO_REF || 'main' }}" \
          BUILD_METADATA_TARGET="${{ matrix.platform.target }}" \
          BUILD_METADATA_RUST_TOOLCHAIN="${{ inputs.rust_toolchain }}" \
          BUILD_METADATA_CARGO_LOCK_SHA256="$lock_hash" \
          BUILD_METADATA_RELEASE_WORKFLOW_SHA256="$workflow_hash" \
          BUILD_METADATA_PUBLIC_BUILD_RS_SHA256="$build_rs_hash" \
          BUILD_METADATA_RUNNER="${{ matrix.platform.runner }}" \
          BUILD_METADATA_GITHUB_REPOSITORY="${{ github.repository }}" \
          BUILD_METADATA_GITHUB_RUN_ID="${{ github.run_id }}" \
          BUILD_METADATA_GITHUB_RUN_ATTEMPT="${{ github.run_attempt }}" \
          BUILD_METADATA_GITHUB_ACTOR="${{ github.actor }}" \
          "$python_cmd" - <<'PY'
          import json
          import os

          metadata = {
              "name": os.environ["BUILD_METADATA_NAME"],
              "version": os.environ["BUILD_METADATA_VERSION"],
              "source_visibility": "private",
              "private_repository": os.environ["BUILD_METADATA_PRIVATE_REPOSITORY"],
              "private_ref": os.environ["BUILD_METADATA_PRIVATE_REF"],
              "target": os.environ["BUILD_METADATA_TARGET"],
              "profile": "release",
              "rust_toolchain": os.environ["BUILD_METADATA_RUST_TOOLCHAIN"],
              "cargo_lock_sha256": os.environ["BUILD_METADATA_CARGO_LOCK_SHA256"],
              "release_workflow_sha256": os.environ["BUILD_METADATA_RELEASE_WORKFLOW_SHA256"],
              "public_build_rs_sha256": os.environ["BUILD_METADATA_PUBLIC_BUILD_RS_SHA256"],
              "built_by": "github-actions",
              "runner": os.environ["BUILD_METADATA_RUNNER"],
              "github_repository": os.environ["BUILD_METADATA_GITHUB_REPOSITORY"],
              "github_run_id": os.environ["BUILD_METADATA_GITHUB_RUN_ID"],
              "github_run_attempt": os.environ["BUILD_METADATA_GITHUB_RUN_ATTEMPT"],
              "github_actor": os.environ["BUILD_METADATA_GITHUB_ACTOR"],
          }

          with open("build-info.json", "w", encoding="utf-8") as f:
              json.dump(metadata, f, ensure_ascii=False, indent=2)
              f.write("\n")
          PY

      - name: Format check
        working-directory: private-src
        run: |
          set -euo pipefail
          cargo "+${{ inputs.rust_toolchain }}" fmt --check

      - name: Build release
        working-directory: private-src
        run: |
          set -euo pipefail
          cargo "+${{ inputs.rust_toolchain }}" build --release --locked --target "${{ matrix.platform.target }}"

      - name: Package release assets
        run: |
          set -euo pipefail

          sha256_file() {
            if command -v sha256sum >/dev/null 2>&1; then
              sha256sum "$1" | awk '{print tolower($1)}'
            elif command -v shasum >/dev/null 2>&1; then
              shasum -a 256 "$1" | awk '{print tolower($1)}'
            elif command -v certutil >/dev/null 2>&1; then
              certutil -hashfile "$1" SHA256 | awk 'NF == 1 && $1 ~ /^[0-9A-Fa-f]{64}$/ {print tolower($1); exit}'
            else
              echo "No SHA256 tool found" >&2
              exit 1
            fi
          }

          find_python() {
            if command -v python3 >/dev/null 2>&1; then
              echo "python3"
            elif command -v python >/dev/null 2>&1; then
              echo "python"
            else
              echo "No Python executable found" >&2
              exit 1
            fi
          }

          binary="${{ inputs.binary_name }}${{ matrix.platform.binary_suffix }}"
          archive_name="${{ inputs.binary_name }}-${{ inputs.version }}-${{ matrix.platform.archive_name }}"
          build_info_asset_name="build-info-${{ matrix.platform.artifact_name }}.json"
          python_cmd="$(find_python)"

          rm -rf dist
          mkdir -p dist

          cp "./private-src/target/${{ matrix.platform.target }}/release/${binary}" "./dist/${binary}"
          cp ./build-info.json ./dist/build-info.json
          cp -f ./Cargo.lock ./dist/Cargo.lock
          cp -f ./Cargo.lock.sha256 ./dist/Cargo.lock.sha256

          if [ -f ./config/config.example.yaml ]; then
            cp ./config/config.example.yaml ./dist/config.example.yaml
          fi

          if [ -f ./config/config.example.json ]; then
            cp ./config/config.example.json ./dist/config.example.json
          fi
          
          if [ -f ./config/codex-cli/codex-cli.example.config.toml ]; then
            cp ./config/codex-cli/codex-cli.example.config.toml ./dist/codex-cli.example.config.toml
          fi      
          
          if [ -f ./config/codex-cli/mimo.json ]; then
            cp ./config/codex-cli/mimo.json ./dist/mimo.json
          fi

          if [ -f ./config/codex-cli/README.md ]; then
            cp ./config/codex-cli/README.md ./dist/CODEX-CONFIG-README.md
          fi

          cp ./README.md ./dist/README.txt
          cp ./VERIFY.md ./dist/VERIFY.txt
          cp ./SECURITY.md ./dist/SECURITY.txt
          cp ./LICENSE.txt ./dist/LICENSE.txt

          rm -f "$archive_name"

          case "$archive_name" in
            *.zip)
              "$python_cmd" - "$archive_name" <<'PY'
          import pathlib
          import sys
          import zipfile

          archive_name = sys.argv[1]
          dist = pathlib.Path("dist")

          with zipfile.ZipFile(archive_name, "w", compression=zipfile.ZIP_DEFLATED) as zf:
              for path in sorted(dist.rglob("*")):
                  if path.is_file():
                      zf.write(path, path.relative_to(dist).as_posix())
          PY
              ;;
            *.tar.gz)
              tar -C dist -czf "$archive_name" .
              ;;
            *)
              echo "Unsupported archive format: $archive_name" >&2
              exit 1
              ;;
          esac

          cp ./build-info.json "./${build_info_asset_name}"
          printf '%s  %s\n' "$(sha256_file "$archive_name")" "$archive_name" > ./sha256sums.txt

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-${{ matrix.platform.artifact_name }}
          path: |
            ${{ inputs.binary_name }}-${{ inputs.version }}-${{ matrix.platform.archive_name }}
            sha256sums.txt
            build-info-${{ matrix.platform.artifact_name }}.json
            Cargo.lock
            Cargo.lock.sha256
            build.rs.sha256
            release.yml.sha256

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: release

    permissions:
      contents: write

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout public distribution repo
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Download packaged artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Merge checksum manifests
        run: |
          set -euo pipefail
          find artifacts -name sha256sums.txt -print0 | sort -z | xargs -0 cat > sha256sums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ inputs.version }}
          name: ${{ inputs.binary_name }} ${{ inputs.version }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            artifacts/release-windows-x86_64/${{ inputs.binary_name }}-${{ inputs.version }}-windows-x86_64.zip
            artifacts/release-linux-x86_64/${{ inputs.binary_name }}-${{ inputs.version }}-linux-x86_64.tar.gz
            artifacts/release-macos-arm64/${{ inputs.binary_name }}-${{ inputs.version }}-macos-arm64.tar.gz
            sha256sums.txt
            artifacts/release-windows-x86_64/build-info-windows-x86_64.json
            artifacts/release-linux-x86_64/build-info-linux-x86_64.json
            artifacts/release-macos-arm64/build-info-macos-arm64.json
            artifacts/release-windows-x86_64/Cargo.lock
            artifacts/release-windows-x86_64/Cargo.lock.sha256
            build.rs
            artifacts/release-windows-x86_64/build.rs.sha256
            .github/workflows/release.yml
            artifacts/release-windows-x86_64/release.yml.sha256
