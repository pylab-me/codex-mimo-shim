name: Release closed-source binary

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, e.g. v0.1.7"
        required: true
        type: string
      private_ref:
        description: "Private repo ref, tag, branch, or commit"
        required: false
        default: "main"
        type: string
      binary_name:
        description: "Release binary name without .exe"
        required: true
        default: "codex-mimo-shim"
        type: string
      rust_toolchain:
        description: "Rust toolchain"
        required: true
        default: "nightly"
        type: string

permissions:
  contents: read

jobs:
  release:
    name: Build and package ${{ matrix.platform.label }}
    runs-on: ${{ matrix.platform.runner }}
    environment: release

    strategy:
      fail-fast: false
      matrix:
        platform:
          - label: Windows x86_64
            runner: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: windows-x86_64
            archive_name: windows-x86_64.zip
            binary_suffix: .exe
          - label: Linux x86_64
            runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: linux-x86_64
            archive_name: linux-x86_64.tar.gz
            binary_suffix: ""
          - label: macOS arm64
            runner: macos-14
            target: aarch64-apple-darwin
            artifact_name: macos-arm64
            archive_name: macos-arm64.tar.gz
            binary_suffix: ""

    permissions:
      contents: write

    steps:
      - name: Checkout public distribution repo
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Checkout private source
        uses: actions/checkout@v6
        with:
          repository: ${{ vars.CODEX_MIMO_SHIM_PRIVATE_REPO_SLUG }}
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          ref: ${{ inputs.private_ref || vars.CODEX_MIMO_SHIM_PRIVATE_REPO_REF || 'main' }}
          path: private-src
          persist-credentials: false

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ inputs.rust_toolchain }}
          target: ${{ matrix.platform.target }}

      - name: Inject public build.rs
        shell: pwsh
        run: |
          Copy-Item .\build.rs .\private-src\build.rs -Force

      - name: Calculate release fingerprints
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $lockHash = (Get-FileHash .\private-src\Cargo.lock -Algorithm SHA256).Hash.ToLower()
          $workflowHash = (Get-FileHash .\.github\workflows\release.yml -Algorithm SHA256).Hash.ToLower()
          $buildRsHash = (Get-FileHash .\build.rs -Algorithm SHA256).Hash.ToLower()

          "BUILD_CARGO_LOCK_SHA256=$lockHash" >> $env:GITHUB_ENV
          "BUILD_CI_WORKFLOW_SHA256=$workflowHash" >> $env:GITHUB_ENV
          "BUILD_PUBLIC_BUILD_RS_SHA256=$buildRsHash" >> $env:GITHUB_ENV
          "BUILD_SOURCE_REF=${{ inputs.private_ref || vars.CODEX_MIMO_SHIM_PRIVATE_REPO_REF || 'main' }}" >> $env:GITHUB_ENV
          "BUILD_SOURCE_REPOSITORY=${{ vars.CODEX_MIMO_SHIM_PRIVATE_REPO_SLUG }}" >> $env:GITHUB_ENV
          "BUILD_RELEASE_VERSION=${{ inputs.version }}" >> $env:GITHUB_ENV
          "BUILD_RELEASE_TARGET=${{ matrix.platform.target }}" >> $env:GITHUB_ENV

          Copy-Item .\private-src\Cargo.lock .\Cargo.lock -Force
          $lockHash | Out-File -Encoding ascii .\Cargo.lock.sha256
          $workflowHash | Out-File -Encoding ascii .\release.yml.sha256
          $buildRsHash | Out-File -Encoding ascii .\build.rs.sha256

          $metadata = [ordered]@{
            name = "${{ inputs.binary_name }}"
            version = "${{ inputs.version }}"
            source_visibility = "private"
            private_repository = "${{ vars.CODEX_MIMO_SHIM_PRIVATE_REPO_SLUG }}"
            private_ref = "${{ inputs.private_ref || vars.CODEX_MIMO_SHIM_PRIVATE_REPO_REF || 'main' }}"
            target = "${{ matrix.platform.target }}"
            profile = "release"
            rust_toolchain = "${{ inputs.rust_toolchain }}"
            cargo_lock_sha256 = $lockHash
            release_workflow_sha256 = $workflowHash
            public_build_rs_sha256 = $buildRsHash
            built_by = "github-actions"
            runner = "${{ matrix.platform.runner }}"
            github_repository = "${{ github.repository }}"
            github_run_id = "${{ github.run_id }}"
            github_run_attempt = "${{ github.run_attempt }}"
            github_actor = "${{ github.actor }}"
          }
          $metadata | ConvertTo-Json -Depth 8 | Out-File -Encoding utf8 .\build-info.json

      - name: Format check
        shell: pwsh
        working-directory: private-src
        run: |
          $ErrorActionPreference = "Stop"
          cargo +${{ inputs.rust_toolchain }} fmt --check

      - name: Build release
        shell: pwsh
        working-directory: private-src
        run: |
          $ErrorActionPreference = "Stop"
          cargo +${{ inputs.rust_toolchain }} build --release --locked --target ${{ matrix.platform.target }}

      - name: Package release assets (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $binary = "${{ inputs.binary_name }}${{ matrix.platform.binary_suffix }}"
          $archiveName = "${{ inputs.binary_name }}-${{ inputs.version }}-${{ matrix.platform.archive_name }}"
          $buildInfoAssetName = "build-info-${{ matrix.platform.artifact_name }}.json"

          New-Item -ItemType Directory -Force dist | Out-Null

          Copy-Item ".\private-src\target\${{ matrix.platform.target }}\release\$binary" ".\dist\$binary" -Force
          Copy-Item .\build-info.json .\dist\build-info.json -Force
          Copy-Item .\Cargo.lock .\dist\Cargo.lock -Force
          Copy-Item .\Cargo.lock.sha256 .\dist\Cargo.lock.sha256 -Force

          if (Test-Path .\private-src\config.example.yaml) {
            Copy-Item .\private-src\config.example.yaml .\dist\config.example.yaml -Force
          } elseif (Test-Path .\config\config.example.yaml) {
            Copy-Item .\config\config.example.yaml .\dist\config.example.yaml -Force
          }

          if (Test-Path .\private-src\config.example.json) {
            Copy-Item .\private-src\config.example.json .\dist\config.example.json -Force
          } elseif (Test-Path .\config\config.example.json) {
            Copy-Item .\config\config.example.json .\dist\config.example.json -Force
          }

          Copy-Item .\README.md .\dist\README.txt -Force
          Copy-Item .\VERIFY.md .\dist\VERIFY.txt -Force
          Copy-Item .\SECURITY.md .\dist\SECURITY.txt -Force
          Copy-Item .\LICENSE.txt .\dist\LICENSE.txt -Force

          if (Test-Path $archiveName) {
            Remove-Item $archiveName -Force
          }
          Compress-Archive -Path .\dist\* -DestinationPath $archiveName -Force
          Copy-Item .\build-info.json ".\$buildInfoAssetName" -Force

          Get-FileHash ".\$archiveName" -Algorithm SHA256 |
            ForEach-Object { "$($_.Hash.ToLower())  $archiveName" } |
            Out-File -Encoding ascii .\sha256sums.txt

      - name: Package release assets (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          binary="${{ inputs.binary_name }}${{ matrix.platform.binary_suffix }}"
          archive_name="${{ inputs.binary_name }}-${{ inputs.version }}-${{ matrix.platform.archive_name }}"
          build_info_asset_name="build-info-${{ matrix.platform.artifact_name }}.json"

          mkdir -p dist

          cp "./private-src/target/${{ matrix.platform.target }}/release/${binary}" "./dist/${binary}"
          cp ./build-info.json ./dist/build-info.json
          cp ./Cargo.lock ./dist/Cargo.lock
          cp ./Cargo.lock.sha256 ./dist/Cargo.lock.sha256

          if [ -f ./private-src/config.example.yaml ]; then
            cp ./private-src/config.example.yaml ./dist/config.example.yaml
          elif [ -f ./config/config.example.yaml ]; then
            cp ./config/config.example.yaml ./dist/config.example.yaml
          fi

          if [ -f ./private-src/config.example.json ]; then
            cp ./private-src/config.example.json ./dist/config.example.json
          elif [ -f ./config/config.example.json ]; then
            cp ./config/config.example.json ./dist/config.example.json
          fi

          cp ./README.md ./dist/README.txt
          cp ./VERIFY.md ./dist/VERIFY.txt
          cp ./SECURITY.md ./dist/SECURITY.txt
          cp ./LICENSE.txt ./dist/LICENSE.txt

          rm -f "$archive_name"
          tar -C dist -czf "$archive_name" .
          cp ./build-info.json "./${build_info_asset_name}"
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "$archive_name" | awk '{print tolower($1) "  " $2}' > ./sha256sums.txt
          else
            shasum -a 256 "$archive_name" | awk '{print tolower($1) "  " $2}' > ./sha256sums.txt
          fi

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v8
        with:
          name: release-${{ matrix.platform.artifact_name }}
          path: |
            ${{ inputs.binary_name }}-${{ inputs.version }}-${{ matrix.platform.archive_name }}
            sha256sums.txt
            build-info-${{ matrix.platform.artifact_name }}.json
            Cargo.lock
            Cargo.lock.sha256
            build.rs.sha256
            release.yml.sha256

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: release

    permissions:
      contents: write

    steps:
      - name: Checkout public distribution repo
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Merge checksum manifests
        shell: bash
        run: |
          set -euo pipefail
          find artifacts -name sha256sums.txt -print0 | sort -z | xargs -0 cat > sha256sums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ inputs.version }}
          name: ${{ inputs.binary_name }} ${{ inputs.version }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            artifacts/release-windows-x86_64/${{ inputs.binary_name }}-${{ inputs.version }}-windows-x86_64.zip
            artifacts/release-linux-x86_64/${{ inputs.binary_name }}-${{ inputs.version }}-linux-x86_64.tar.gz
            artifacts/release-macos-arm64/${{ inputs.binary_name }}-${{ inputs.version }}-macos-arm64.tar.gz
            sha256sums.txt
            artifacts/release-windows-x86_64/build-info-windows-x86_64.json
            artifacts/release-linux-x86_64/build-info-linux-x86_64.json
            artifacts/release-macos-arm64/build-info-macos-arm64.json
            artifacts/release-windows-x86_64/Cargo.lock
            artifacts/release-windows-x86_64/Cargo.lock.sha256
            build.rs
            artifacts/release-windows-x86_64/build.rs.sha256
            .github/workflows/release.yml
            artifacts/release-windows-x86_64/release.yml.sha256
